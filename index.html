<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAITAN SHOP | المتجر المتكامل 🔥</title>
    <style>
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes rgbNeon { 0% { border-color: #00d4ff; box-shadow: 0 0 10px #00d4ff; } 33% { border-color: #8A2BE2; box-shadow: 0 0 10px #8A2BE2; } 66% { border-color: #00ff88; box-shadow: 0 0 10px #00ff88; } 100% { border-color: #00d4ff; box-shadow: 0 0 10px #00d4ff; } }
        @keyframes fireAnimation {
            0% { text-shadow: 0 0 5px #fff, 0 -1px 3px #fff, 0 -2px 10px #ff3, 0 -10px 10px #f90, 0 -18px 20px #f60; color: #fff; }
            50% { text-shadow: 0 0 5px #fff, 0 -1px 3px #fff, 0 -3px 12px #ff3, 0 -12px 12px #f90, 0 -20px 25px #f60; color: #fee; }
            100% { text-shadow: 0 0 5px #fff, 0 -1px 3px #fff, 0 -2px 10px #ff3, 0 -10px 10px #f90, 0 -18px 20px #f60; color: #fff; }
        }
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding-bottom: 100px;
        }
        .cash-bar {
            background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid #ff4500; padding: 15px 0;
            position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 5px 15px rgba(255, 69, 0, 0.4);
        }
        .cash-text { font-size: 1.4em; font-weight: bold; animation: fireAnimation 1.5s infinite; margin: 0; }
        header { padding: 80px 20px 20px; background: rgba(0, 0, 0, 0.6); border-bottom: 3px solid #00d4ff; margin-bottom: 30px; animation: rgbNeon 5s infinite; margin-top: 50px; }
        .main-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; padding: 10px; }
        .price-card {
            background: rgba(255, 255, 255, 0.05); border: 2px solid #8A2BE2; border-radius: 20px;
            padding: 20px; width: 310px; backdrop-filter: blur(15px); animation: rgbNeon 5s infinite;
        }
        .game-title { font-size: 1.4em; margin-bottom: 15px; color: #00d4ff; font-weight: bold; }
        input, select { width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #111; color: white; text-align: center; }
        .order-btn {
            background: rgba(0, 0, 0, 0.5); color: white; padding: 15px; border-radius: 50px;
            font-size: 1.2em; font-weight: bold; cursor: pointer; border: 2px solid; width: 95%; margin-top: 10px; animation: rgbNeon 5s infinite;
        }
        .id-error { border: 2px solid #ff4b2b !important; }
    </style>
</head>
