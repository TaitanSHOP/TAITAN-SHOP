<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAITAN SHOP | شحن مباشر</title>
    <meta name="description" content="Taitan Shop - أفضل متجر شحن شدات ببجي وجواهر بلود سترايك في مصر بأرخص الأسعار وفوري.">
    <style>
        body {
            background: #0f0c29; 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding-bottom: 50px;
        }
        header { padding: 30px; background: rgba(0,0,0,0.4); border-bottom: 3px solid #00d4ff; }
        h1 { color: #00d4ff; text-shadow: 0 0 20px #8A2BE2; margin: 0; font-size: 2.5em; }

        /* صندوق الطلب */
        .order-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #8A2BE2;
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            margin: 40px auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        label { display: block; text-align: right; margin-right: 20px; margin-top: 15px; color: #00d4ff; font-weight: bold; }
        
        input, select {
            width: 90%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #8A2BE2;
            background: #1a1a2e;
            color: white;
            font-size: 1.1em;
            text-align: right;
        }
        
        .order-btn {
            background: #25d366;
            color: white;
            padding: 18px;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 95%;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
            transition: 0.3s;
        }
        .order-btn:hover { background: #128c7e; transform: scale(1.02); }
    </style>
</head>
<body>

    <header>
        <h1>TAITAN SHOP</h1>
        <p>اطلب شحنك الان واستلم في ثواني</p>
    </header>

    <div class="order-box">
        <h3>تفاصيل طلب الشحن</h3>
        
        <label>الايدي (ID):</label>
        <input type="text" id="gameID" placeholder="ادخل الايدي الخاص بك">
        
        <label>الاسم في اللعبة:</label>
        <input type="text" id="gameName" placeholder="اكتب اسمك في اللعبة">
        
        <label>اختار اللعبة:</label>
        <select id="gameType">
            <option value="ببجي موبايل">ببجي موبايل</option>
            <option value="بلود سترايك">بلود سترايك</option>
        </select>

        <label>اختار الكمية والسعر:</label>
        <select id="amount">
            <optgroup label="اسعار ببجي">
                <option value="60 شدة - 45 ج.م">60 شدة - 45 ج.م</option>
                <option value="325 شدة - 220 ج.م">325 شدة - 220 ج.م</option>
                <option value="660 شدة - 435 ج.م">660 شدة - 435 ج.م</option>
                <option value="1800 شدة - 1090 ج.م">1800 شدة - 1090 ج.م</option>
                <option value="3850 شدة - 2150 ج.م">3850 شدة - 2150 ج.م</option>
                <option value="8100 شدة - 4290 ج.م">8100 شدة - 4290 ج.م</option>
            </optgroup>
            <optgroup label="اسعار بلود سترايك">
                <option value="100 ذهب - 41 ج.م">100 ذهب - 41 ج.م</option>
                <option value="540 ذهب - 210 ج.m">540 ذهب - 210 ج.m</option>
                <option value="سترايك باس - 180 ج.m">سترايك باس - 180 ج.m</option>
            </optgroup>
        </select>

        <button class="order-btn" onclick="sendOrder()">ارسال الطلب عبر واتساب</button>
    </div>

    <script>
        function sendOrder() {
            var id = document.getElementById('gameID').value;
            var name = document.getElementById('gameName').value;
            var game = document.getElementById('gameType').value;
            var price = document.getElementById('amount').value;
            
            if(id == "" || name == "") {
                alert("من فضلك اكتب الايدي واسمك عشان نعرف نشحنلك!");
                return;
            }

            // الرسالة اللي هتوصلك على الواتساب
            var message = "اهلا تايتان شوب، اريد طلب شحن:%0A" + 
                          "-----------------------%0A" +
                          "*اللعبة:* " + game + "%0A" +
                          "*الكمية:* " + price + "%0A" +
                          "*الايدي:* " + id + "%0A" +
                          "*الاسم:* " + name + "%0A" +
                          "-----------------------%0A" +
                          "بانتظار اتمام الطلب..";

            // فتح الواتساب
            window.open("https://wa.me/201032275035?text=" + message, "_blank");
        }
    </script>

</body>
</html>
