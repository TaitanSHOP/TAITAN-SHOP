<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAITAN SHOP | متجر الشحن الذكي</title>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding-bottom: 100px;
        }

        header {
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 3px solid #00d4ff;
            margin-bottom: 30px;
        }

        h1 { color: #00d4ff; text-shadow: 0 0 20px #00d4ff; font-size: 2.8em; margin: 0; }

        .main-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 10px;
        }

        .price-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #8A2BE2;
            border-radius: 20px;
            padding: 25px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .price-card:hover { transform: translateY(-10px); border-color: #00d4ff; }

        .game-title { font-size: 1.6em; margin-bottom: 20px; color: #00d4ff; }

        select, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #8A2BE2;
            background: #1a1a2e;
            color: white;
            font-size: 1em;
            text-align: center;
        }

        .order-btn {
            background: #25d366;
            color: white;
            padding: 15px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
        }

        .order-btn:hover { background: #128c7e; transform: scale(1.05); }
    </style>
</head>
<body>

    <header>
        <h1>TAITAN SHOP</h1>
        <p style="color: #00d4ff; font-weight: bold;">اختار باقتك واشحن في ثواني</p>
    </header>

    <div class="main-container">
        
        <div class="price-card">
            <div class="game-title">ببجي موبايل (ID)</div>
            <input type="text" id="pubgID" placeholder="ادخل الايدي (ID)">
            <select id="pubgPack">
                <option value="60 شدة - 45 ج">60 UC - 45 EGP</option>
                <option value="325 شدة - 220 ج">325 UC - 220 EGP</option>
                <option value="660 شدة - 435 ج">660 UC - 435 EGP</option>
                <option value="1800 شدة - 1090 ج">1800 UC - 1090 EGP</option>
            </select>
            <button class="order-btn" onclick="sendOrder('ببجي شدات', 'pubgID', 'pubgPack')">اطلب الآن</button>
        </div>

        <div class="price-card">
            <div class="game-title">عروض ببجي</div>
            <input type="text" id="offerID" placeholder="ادخل الايدي (ID)">
            <select id="offerPack">
                <option value="الرويال باس (1-50) - 290 ج">الرويال باس (1-50) - 290 ج</option>
                <option value="بطاقة النخبة (1-100) - 560 ج">بطاقة النخبة (1-100) - 560 ج</option>
                <option value="برايم بلس شهر - 475 ج">برايم بلس شهر - 475 ج</option>
                <option value="حزمة الشراء الاول - 55 ج">حزمة الشراء الاول - 55 ج</option>
            </select>
            <button class="order-btn" onclick="sendOrder('ببجي عروض', 'offerID', 'offerPack')">اطلب الآن</button>
        </div>

        <div class="price-card">
            <div class="game-title">فري فاير (💎)</div>
            <input type="text" id="ffID" placeholder="ادخل الايدي (ID)">
            <select id="ffPack">
                <option value="100 جوهرة - 50 ج">100 💎 - 50 EGP</option>
                <option value="210 جوهرة - 105 ج">210 💎 - 105 EGP</option>
                <option value="520+10 جواهر - 260 ج">520+10 💎 - 260 EGP</option>
            </select>
            <button class="order-btn" onclick="sendOrder('فري فاير', 'ffID', 'ffPack')">اطلب الآن</button>
        </div>

        <div class="price-card">
            <div class="game-title">بلود سترايك (ID)</div>
            <input type="text" id="bsID" placeholder="ادخل الايدي (ID)">
            <select id="bsPack">
                <option value="100 ذهب - 41 ج">100 Gold - 41 EGP</option>
                <option value="540 ذهب - 210 ج">540 Gold - 210 EGP</option>
                <option value="سترايك باس - 180 ج">Strike Pass - 180 EGP</option>
            </select>
            <button class="order-btn" onclick="sendOrder('بلود سترايك', 'bsID', 'bsPack')">اطلب الآن</button>
        </div>

    </div>

    <script>
        function sendOrder(gameName, idField, packField) {
            var id = document.getElementById(idField).value;
            var pack = document.getElementById(packField).value;
            
            if(id == "") {
                alert("من فضلك اكتب الايدي بتاعك الأول");
                return;
            }

            var message = "اهلا تايتان شوب، اريد طلب شحن:%0A" + 
                          "*اللعبة:* " + gameName + "%0A" +
                          "*الباقة:* " + pack + "%0A" +
                          "*الايدي:* " + id;

            window.open("https://wa.me/201032275035?text=" + message, "_blank");
        }
    </script>

</body>
</html>
