<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAITAN SHOP | نظام الشحن الذكي</title>
    <style>
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes rgbNeon { 0% { border-color: #00d4ff; box-shadow: 0 0 10px #00d4ff; } 33% { border-color: #8A2BE2; box-shadow: 0 0 10px #8A2BE2; } 66% { border-color: #00ff88; box-shadow: 0 0 10px #00ff88; } 100% { border-color: #00d4ff; box-shadow: 0 0 10px #00d4ff; } }
        
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding-bottom: 100px;
        }

        header { padding: 40px 20px; background: rgba(0, 0, 0, 0.6); border-bottom: 3px solid #00d4ff; margin-bottom: 40px; animation: rgbNeon 5s infinite; }
        h1 { font-size: 3em; color: #fff; text-shadow: 0 0 15px #00d4ff; margin: 0; }

        .main-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 25px; padding: 10px; }
        .price-card {
            background: rgba(255, 255, 255, 0.04); border: 2px solid #8A2BE2; border-radius: 25px;
            padding: 25px; width: 310px; backdrop-filter: blur(15px); animation: rgbNeon 5s infinite;
            transition: 0.3s;
        }
        .price-card:hover { transform: translateY(-10px); }

        .game-title { font-size: 1.5em; margin-bottom: 15px; color: #00d4ff; font-weight: bold; }

        input, select {
            width: 90%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: #101020; color: white; font-size: 1em; text-align: center;
        }

        .order-btn {
            background: rgba(0, 0, 0, 0.3); color: white; padding: 15px; border-radius: 50px;
            font-size: 1.2em; font-weight: bold; cursor: pointer; border: 2px solid; width: 95%;
            margin-top: 15px; animation: rgbNeon 5s infinite; transition: 0.3s;
        }
        .id-error { border: 2px solid #ff4b2b !important; background: rgba(255, 75, 43, 0.1) !important; }
    </style>
</head>
<body>

    <header>
        <h1>TAITAN SHOP</h1>
        <p>اختار باقتك.. نتحقق من الايدي.. واشحن فوراً</p>
    </header>

    <div class="main-container">
        
        <div class="price-card">
            <div class="game-title">عروض ببجي ID</div>
            <input type="number" id="offerID" placeholder="ادخل الايدي (ارقام فقط)">
            <select id="offerPack">
                <option value="الرويال باس (1-50) - 290 ج">الرويال باس (1-50) - 290 ج</option>
                <option value="بطاقة النخبة (1-100) - 560 ج">بطاقة النخبة (1-100) - 560 ج</option>
                <option value="ELITE PASS PLUS - 1390 ج">ELITE PASS PLUS - 1390 ج</option>
                <option value="برايم بلس شهر - 475 ج">برايم بلس شهر - 475 ج</option>
                <option value="حزمة الشراء الاول - 55 ج">حزمة الشراء الاول - 55 ج</option>
                <option value="القنبلة الخرافي - 250 ج">القنبلة الخرافي - 250 ج</option>
            </select>
            <button class="order-btn" onclick="checkAndSend('ببجي عروض', 'offerID', 'offerPack', 8, 12)">اطلب العرض</button>
        </div>

        <div class="price-card">
            <div class="game-title">شدات PUBG UC</div>
            <input type="number" id="pubgID" placeholder="ادخل الايدي (ارقام فقط)">
            <select id="pubgPack">
                <option value="60 شدة - 45 ج">60 UC - 45 EGP</option>
                <option value="325 شدة - 220 ج">325 UC - 220 EGP</option>
                <option value="660 شدة - 435 ج">660 UC - 435 EGP</option>
                <option value="1800 شدة - 1090 ج">1800 UC - 1090 EGP</option>
            </select>
            <button class="order-btn" onclick="checkAndSend('ببجي شدات', 'pubgID', 'pubgPack', 8, 12)">اشحن شدات</button>
        </div>

        <div class="price-card">
            <div class="game-title">FREE FIRE 💎</div>
            <input type="number" id="ffID" placeholder="ادخل الايدي (ارقام فقط)">
            <select id="ffPack">
                <option value="100 جوهرة - 50 ج">100 💎 - 50 EGP</option>
                <option value="210 جوهرة - 105 ج">210 💎 - 105 EGP</option>
                <option value="520+10 جواهر - 260 ج">520+10 💎 - 260 EGP</option>
                <option value="1080+108 جواهر - 470 ج">1080+108 💎 - 470 EGP</option>
            </select>
            <button class="order-btn" onclick="checkAndSend('فري فاير', 'ffID', 'ffPack', 8, 11)">اشحن جواهر</button>
        </div>

        <div class="price-card">
            <div class="game-title">BLOOD STRIKE</div>
            <input type="number" id="bsID" placeholder="ادخل الايدي (ارقام فقط)">
            <select id="bsPack">
                <option value="100 ذهب - 41 ج">100 Gold - 41 EGP</option>
                <option value="540 ذهب - 210 ج">540 Gold - 210 EGP</option>
                <option value="سترايك باس - 180 ج">Strike Pass - 180 EGP</option>
            </select>
            <button class="order-btn" onclick="checkAndSend('بلود سترايك', 'bsID', 'bsPack', 7, 10)">اطلب ذهب</button>
        </div>

    </div>

    <script>
        function checkAndSend(game, idField, packField, minLen, maxLen) {
            var idInput = document.getElementById(idField);
            var idValue = idInput.value;
            var pack = document.getElementById(packField).value;

            if (idValue.length < minLen || idValue.length > maxLen) {
                idInput.classList.add('id-error');
                alert("خطأ! ايدي " + game + " لازم يكون بين " + minLen + " و " + maxLen + " رقم.");
                return;
            }

            idInput.classList.remove('id-error');
            var message = "اهلا تايتان شوب، اريد شحن:%0A" + 
                          "*اللعبة:* " + game + "%0A" + 
                          "*الباقة:* " + pack + "%0A" + 
                          "*الايدي:* " + idValue;

            window.open("https://wa.me/201032275035?text=" + message, "_blank");
        }
    </script>

</body>
</html>
